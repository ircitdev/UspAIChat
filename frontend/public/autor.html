<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Разработчик — UspAIChat</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0D0D1A; color: #F1F5F9;
            line-height: 1.7; padding: 0;
        }
        .container {
            max-width: 720px; margin: 0 auto;
            padding: 48px 24px 80px;
        }
        .logo {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 40px; text-decoration: none;
        }
        .logo-icon {
            width: 40px; height: 40px; border-radius: 12px;
            background: linear-gradient(135deg, #7C3AED, #6B21A8);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .logo-text { color: #F1F5F9; font-size: 20px; font-weight: 700; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: #F1F5F9; }
        .subtitle { color: #94A3B8; font-size: 14px; margin-bottom: 40px; }

        .card {
            background: #1A1A2E;
            border: 1px solid #2D2D3F;
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
        }
        .avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #6B21A8);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: 700; color: white;
            margin-bottom: 20px;
        }
        .name {
            font-size: 22px; font-weight: 700; color: #F1F5F9;
            margin-bottom: 4px;
        }
        .role {
            font-size: 14px; color: #94A3B8;
            margin-bottom: 24px;
        }

        .info-grid {
            display: grid; gap: 16px;
        }
        .info-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px;
            background: #141422;
            border: 1px solid #2D2D3F;
            border-radius: 12px;
        }
        .info-icon {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .info-icon.phone { background: #059669/15; color: #34D399; background: rgba(5, 150, 105, 0.15); }
        .info-icon.email { background: rgba(124, 58, 237, 0.15); color: #A78BFA; }
        .info-icon.web { background: rgba(59, 130, 246, 0.15); color: #60A5FA; }
        .info-label { font-size: 12px; color: #64748B; margin-bottom: 2px; }
        .info-value { font-size: 14px; color: #F1F5F9; font-weight: 500; }
        .info-value a {
            color: #A78BFA; text-decoration: none;
        }
        .info-value a:hover { text-decoration: underline; }

        .section-title {
            font-size: 16px; font-weight: 600; color: #F1F5F9;
            margin-bottom: 12px; margin-top: 32px;
        }
        .description {
            color: #94A3B8; font-size: 14px; line-height: 1.8;
        }

        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            color: #A78BFA; text-decoration: none; font-size: 14px;
            margin-top: 32px;
        }
        .back-link:hover { text-decoration: underline; }

        .footer {
            margin-top: 60px; padding-top: 24px;
            border-top: 1px solid #2D2D3F;
            text-align: center;
            color: #64748B; font-size: 13px;
        }

        @media (max-width: 480px) {
            .container { padding: 24px 16px 60px; }
            h1 { font-size: 22px; }
            .card { padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="logo">
            <div class="logo-icon">U</div>
            <span class="logo-text">UspAIChat</span>
        </a>

        <h1>Разработчик</h1>

            <div class="role">Разработчик UspAIChat</div>

            <div class="info-grid">
                <div class="info-item">
                    <div class="info-icon phone">

                    </div>
                    <div>
                        <div class="info-label">Телефон</div>
                        <div class="info-value"><a href="tel:+79169535760">+7 (916) 953-57-60</a></div>
                    </div>
                </div>

                <div class="info-item">
                    <div class="info-icon email">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    </div>
                    <div>
                        <div class="info-label">Email</div>
                        <div class="info-value"><a href="mailto:aleksandr@uspeshnyy.ru">aleksandr@uspeshnyy.ru</a></div>
                    </div>
                </div>

                <div class="info-item">
                    <div class="info-icon web">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    </div>
                    <div>
                        <div class="info-label">Веб-сайт</div>
                        <div class="info-value"><a href="https://app.aifuturenow.ru" target="_blank">app.aifuturenow.ru</a></div>
                    </div>
                </div>
            </div>
        </div>

        <a href="/" class="back-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
            Вернуться в приложение
        </a>

        <div class="footer">
            &copy; 2024&ndash;2026 UspAIChat. Все права защищены.
        </div>
    </div>
</body>
</html>
